                            <div className="grid md:grid-cols-3 gap-12 text-left bg-white p-12 rounded-3xl border border-slate-100 shadow-2xl shadow-green-900/5">

                                 </div>
                                 <div>

                                         <GraduationCap className="w-6 h-6" />
                                     </div>
                                     <h3 className="text-xl font-black text-slate-800 mb-3">Proven Success</h3>
                                     <p className="text-slate-500 font-medium text-sm leading-relaxed">Research shows that schools using Learnify outperform state standards by up to 15%.</p>
                                 </div>
                            </div>
                        </div>
                    </main>

                    {/* Realistic Educational Footer */}
                    <footer className="bg-[#24292e] text-white/50 py-16 px-6 border-t border-white/5">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-4 gap-12 text-[12px]">
                            <div className="space-y-6">
                                <div className="flex items-center gap-2 text-white/80">
                                    <BookOpen className="w-4 h-4 text-[#00a300]" />
                                    <span className="font-black text-lg tracking-tight uppercase">LEARNIFY</span>
                                </div>
                                <p className="leading-relaxed">Dedicated to making quality education accessible through interactive technology and data-driven instruction.</p>
                            </div>
                            <div className="space-y-4">
                                <h4 className="text-white text-xs font-black uppercase tracking-widest">Resources</h4>
                                <ul className="space-y-2">
                                    <li><a href="#" className="hover:text-white transition-colors">Standards Mapping</a></li>

                                </ul>
                            </div>
                            <div className="space-y-4">
                                <h4 className="text-white text-xs font-black uppercase tracking-widest">Company</h4>

        const FALLBACK_IMAGES = [
            "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400",
            "https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=400",
            "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=400",
            "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?auto=format&fit=crop&q=80&w=400",
            "https://images.unsplash.com/photo-1538481199705-c710c4e965fc?auto=format&fit=crop&q=80&w=400",
            "https://images.unsplash.com/photo-1542751110-97497ec58bc3?auto=format&fit=crop&q=80&w=400",
            "https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?auto=format&fit=crop&q=80&w=400",
            "https://images.unsplash.com/photo-1580234811497-9bd7fd0f56ee?auto=format&fit=crop&q=80&w=400",
            "https://images.unsplash.com/photo-1555680202-c86f0e12f086?auto=format&fit=crop&q=80&w=400"
        ];

        function getThumbnail(id, title) {
            // Seeded random for consistent fallback
            const seed = (title?.length || 0) % FALLBACK_IMAGES.length;
            const fallback = FALLBACK_IMAGES[seed];
            
            // Try potential sources - in real app we'd check existence, 
            // but here we'll use a safe construction
            return `https://raw.githubusercontent.com/skid-inc/skid-pages/main/images/${id}.png`;
        }

        function GameCard({ game, size = 'normal' }) {
            const [error, setError] = useState(false);
            const seed = useMemo(() => (game?.title?.length || 0) % FALLBACK_IMAGES.length, [game?.title]);
            const fallback = FALLBACK_IMAGES[seed];

            if (!game) return null;

            return (
                <Link 
                    to={`/game/${game.id}`}
                    className={`group relative overflow-hidden rounded-2xl border border-white/5 bg-zinc-900/50 backdrop-blur-sm game-card-hover ${size === 'large' ? 'col-span-2 row-span-2' : ''}`}
                >
                    <div className={`${size === 'large' ? 'aspect-square' : 'aspect-[4/3]'} w-full overflow-hidden relative`}>
                        <img 
                            src={!error ? getThumbnail(game.id, game.title) : fallback} 
                            alt={game.title}
                            className="w-full h-full object-cover transition-all duration-700 group-hover:scale-110 group-hover:rotate-1"
                            onError={() => setError(true)}
                            referrerPolicy="no-referrer"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent transition-opacity group-hover:opacity-60" />
                        
                        <div className="absolute top-3 left-3 flex gap-2">
                            {game.char === 'A' && (
                                <div className="px-2 py-0.5 bg-blue-600 text-white text-[9px] font-black uppercase rounded-md shadow-lg shadow-blue-600/20">NEW</div>
                            )}
                            {size === 'large' && (
                                <div className="px-2 py-0.5 bg-zinc-900/80 backdrop-blur-md text-white text-[9px] font-black uppercase rounded-md border border-white/10">FEATURED</div>
                            )}
                        </div>
                    </div>
                    
                    <div className="p-4 bg-zinc-900/80 border-t border-white/5 relative">
                        <div className="flex items-center justify-between gap-3">
                            <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2 mb-1.5">
                                    <div className="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]" />
                                    <span className="text-[9px] font-black text-zinc-500 uppercase tracking-widest leading-none">Sector Archive</span>
                                </div>
                                <h4 className={`font-black text-white truncate uppercase tracking-tighter leading-tight ${size === 'large' ? 'text-2xl' : 'text-xs'}`}>
                                    {game.title}
                                </h4>
                            </div>
                            <div className="shrink-0 w-8 h-8 rounded-xl bg-blue-600 flex items-center justify-center scale-0 group-hover:scale-100 transition-transform shadow-lg shadow-blue-600/40">
                                <Gamepad2 className="w-4 h-4 text-white" />
                            </div>
                        </div>
                    </div>
                </Link>
            );
        }

        function GameView() {
            const { id } = useParams();
            const navigate = useNavigate();
            const [loading, setLoading] = useState(true);
            const [allGames, setAllGames] = useState([]);
            const isStaticHost = window.location.hostname.endsWith('.github.io') || 
                                 window.location.hostname.includes('github.io') || 
                                 window.location.hostname.includes('googleusercontent.com') ||
                                 (window.location.hostname !== 'localhost' && 
                                  window.location.hostname !== '127.0.0.1' && 
                                  !window.location.hostname.includes('run.app'));
            const iframeUrl = isStaticHost 
                ? `https://raw.githack.com/mcgee1717/994894838923761723/main/UGS-Files/${id}.html`
                : `/api/ugs/${id}`;
            const title = id.replace(/^(cl|cl_)/i, '').replace(/([A-Z])/g, ' $1').trim() || id;

            useEffect(() => {
                const stored = localStorage.getItem('nebula_games');
                if (stored) setAllGames(JSON.parse(stored));
                
                document.title = `Nebula UGS Playing: ${title}`;
                return () => { document.title = 'Nebula UGS'; };
            }, [title]);

            const recommended = useMemo(() => {
                return [...allGames].sort(() => Math.random() - 0.5).slice(0, 12);
            }, [allGames, id]);

            return (
                <div className="min-h-screen bg-[#050505] flex flex-col">
                    {/* Header */}
                    <div className="h-16 bg-zinc-900 border-b border-zinc-800 flex items-center justify-between px-6 sticky top-0 z-[100]">
                            <div className="flex items-center gap-6">
                                <button onClick={() => navigate('/')} className="p-2 hover:bg-zinc-800 rounded-lg text-zinc-400 group">
                                    <ArrowLeft className="w-6 h-6 group-hover:text-white transition-colors" />
                                </button>
                                <div className="flex flex-col">
                                    <span className="text-[9px] font-black text-blue-500 uppercase tracking-[0.3em] ml-4 mb-0.5">Nebula Interface Active</span>
                                    <h1 className="text-sm font-black text-white px-4 py-1.5 bg-zinc-800 rounded-full border border-white/5 uppercase tracking-widest flex items-center gap-3">
                                        <Monitor className="w-4 h-4 text-zinc-500" />
                                        {title}
                                    </h1>
                                </div>
                            </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.open(iframeUrl, '_blank')} className="p-2.5 text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-lg transition-colors" title="Open in New Tab">
                                <ExternalLink className="w-5 h-5" />
                            </button>
                            <button className="p-2.5 text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-lg transition-colors">
                                <Share2 className="w-5 h-5" />
                            </button>
                            <button 
                                onClick={() => document.getElementById('nebula-iframe')?.requestFullscreen()} 
                                className="ml-2 px-6 h-10 bg-blue-600 hover:bg-blue-500 text-white text-xs font-black uppercase rounded-lg shadow-lg shadow-blue-600/20 active:scale-95 transition-all flex items-center gap-2"
                            >
                                <Maximize2 className="w-4 h-4" />
                                Fullscreen
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col lg:flex-row p-6 gap-6 max-w-[1800px] mx-auto w-full">
                        {/* Game Container */}
                        <div className="flex-1 flex flex-col gap-6">
                            <div className="flex-1 aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl relative border border-zinc-800 group">
                                {loading && (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-zinc-950 z-10">
                                        <div className="w-16 h-16 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin mb-6" />
                                        <div className="space-y-2 text-center">
                                            <p className="text-xs font-black text-blue-500 uppercase tracking-[0.4em] animate-pulse">Initializing Interface...</p>
                                            <p className="text-[10px] text-zinc-500 uppercase tracking-widest">Bridging Nebula Archives</p>
                                        </div>
                                    </div>
                                )}

        function MainLayout() {
            const [games, setGames] = useState([]);
            const [search, setSearch] = useState("");
            const [isLoading, setIsLoading] = useState(true);
            const [selectedCategory, setSelectedCategory] = useState('all');

            useEffect(() => {
                // Initialize from static embedded list in index.html
                const processed = ARCHIVE_GAMES_LIST.filter(f => f && f !== "?").map(f => {
                    const cleanId = f.replace(/\.html$/, '');
                    const namePart = cleanId.replace(/^(cl|cl_)/i, '');
                    return {
                        id: cleanId,
                        title: namePart.replace(/([A-Z])/g, ' $1').trim() || cleanId,
                        char: namePart.substring(0, 1).toUpperCase() || '#'
                    };
                });
                processed.sort((a, b) => a.title.localeCompare(b.title));
                setGames(processed);
                localStorage.setItem('nebula_games', JSON.stringify(processed));
                setIsLoading(false);
            }, []);

            const filteredGames = useMemo(() => {
                let list = games;
                
                // Simulated Category Logic
                if (selectedCategory === 'new') {
                    // Recently added (simulated by taking games starting with 'Z' as a proxy for 'new' in this static list)
                    list = [...games].reverse();
                } else if (selectedCategory === 'trending') {
                    // Random but stable shuffle for trending
                    list = games.filter((_, i) => (i * 7) % 10 < 4);
                } else if (selectedCategory === 'popular') {
                    // Popular simulation
                    list = games.filter((_, i) => (i * 3) % 10 < 3);
                } else if (selectedCategory === 'action') {
                    // Action genre simulation (games with short titles)
                    list = games.filter(g => (g.title?.length || 0) < 10);
                } else if (selectedCategory === 'science') {
                    // Science simulation (games with 'lab' or just a subset of games)
                    list = games.filter(g => g.title?.toLowerCase().includes('lab') || (g.title?.length || 0) % 7 === 0);
                }

                if (search) {
                    const s = search.toLowerCase();
                    list = list.filter(g => g.title?.toLowerCase().includes(s));
                }
                return list;
            }, [games, search, selectedCategory]);

            // Pagination/Virtualization Simulation for performance
            const [visibleCount, setVisibleCount] = useState(60);
            useEffect(() => {
                const handleScroll = () => {
                    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 1000) {
                        setVisibleCount(prev => prev + 40);
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="flex min-h-screen bg-[#050505]">
                    {/* Sidebar Navigation */}
                    <aside className="fixed left-0 top-0 w-20 lg:w-64 h-screen bg-[#0a0a0a] border-r border-zinc-900 flex flex-col z-50">
                        <div className="h-16 flex items-center px-6 mb-8 mt-2">
                             <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20 mr-4">
                                <Zap className="w-6 h-6 text-white fill-white" />
                             </div>
                             <span className="hidden lg:block text-xl font-black text-white italic tracking-tighter">NEBULA<span className="text-blue-500 not-italic ml-1">UGS</span></span>
                        </div>
                        
                        <nav className="flex-1 px-4 space-y-1">
                            {CATEGORIES.map(cat => (
                                <button 
                                    key={cat.id}
                                    onClick={() => setSelectedCategory(cat.id)}
                                    className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all group ${selectedCategory === cat.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/10' : 'text-zinc-500 hover:text-white hover:bg-zinc-900'}`}
                                >
                                    <cat.icon className={`w-5 h-5 ${selectedCategory === cat.id ? 'text-white' : cat.color}`} />
                                    <span className="hidden lg:block text-xs font-black uppercase tracking-widest">{cat.name}</span>
                                </button>
                            ))}
                            
                            <div className="pt-8 pb-4">
                                <span className="hidden lg:block px-4 mb-4 text-[10px] font-black text-zinc-600 uppercase tracking-widest">Community</span>
                                <a href="https://discord.gg/rmVsAqkpkA" target="_blank" className="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-zinc-500 hover:text-white hover:bg-zinc-900 transition-all">
                                    <MessageSquare className="w-5 h-5 text-indigo-500" />
                                    <span className="hidden lg:block text-xs font-black uppercase tracking-widest">Discord</span>
                                </a>
                            </div>
                        </nav>

                        <div className="p-4 mt-auto">

                                            )}
                                        </h3>
                                        <span className="px-3 py-1 bg-zinc-900 border border-zinc-800 rounded-full text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                                            {filteredGames.length} Active Records
                                        </span>
                                    </div>
                                    <div className="flex gap-2">
                                        <div className="h-10 px-4 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center gap-2 text-[10px] font-black text-zinc-400 uppercase">
                                            Sort By: <span className="text-white">A-Z</span>
                                        </div>
                                    </div>
                                </div>

                                {isLoading ? (
                                    <div className="py-40 flex flex-col items-center justify-center space-y-6">
                                        <div className="flex gap-2">
                                            {[0, 1, 2].map(i => (
                                                <motion.div 
                                                    key={i}
                                                    animate={{ 
                                                        scale: [1, 1.2, 1],
                                                        opacity: [0.3, 1, 0.3]
                                                    }}
                                                    transition={{
                                                        duration: 1,
                                                        repeat: Infinity,
                                                        delay: i * 0.2
                                                    }}
                                                    className="w-4 h-4 bg-blue-600 rounded-full"
                                                />
                                            ))}
                                        </div>
                                        <p className="text-zinc-500 font-black uppercase tracking-[0.5em] text-[10px]">Restoring Interface</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6">
                                        <AnimatePresence mode="popLayout">
                                            {filteredGames.slice(0, visibleCount).map((game, idx) => (
                                                <motion.div
                                                    key={game.id}
                                                    layout
                                                    initial={{ opacity: 0, y: 20 }}
                                                    animate={{ opacity: 1, y: 0 }}
                                                    exit={{ opacity: 0, scale: 0.9 }}
                                                    transition={{ duration: 0.3, delay: (idx % 20) * 0.02 }}
                                                >
                                                    <GameCard game={game} size={idx === 0 && !search ? 'large' : 'normal'} />
                                                </motion.div>
                                            ))}
                                        </AnimatePresence>
                                    </div>
                                )}

                                {!isLoading && filteredGames.length === 0 && (
                                    <div className="text-center py-40 bg-zinc-900/20 rounded-[3rem] border border-dashed border-zinc-800 flex flex-col items-center">
                                         <Info className="w-12 h-12 text-zinc-700 mb-6" />
                                         <p className="text-zinc-400 text-xl font-bold italic">No archives match your search query.</p>
                                         <button onClick={() => setSearch("")} className="mt-6 text-blue-500 font-black uppercase text-xs tracking-widest hover:underline">Clear Search</button>
                                    </div>
                                )}
                            </section>
                        </div>
                        
                        <footer className="p-10 border-t border-zinc-900 mt-20 opacity-40">
                             <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                                <div className="flex items-center gap-4">
                                     <div className="w-8 h-8 bg-zinc-800 rounded-lg flex items-center justify-center font-black text-white text-lg">N</div>
                                     <span className="text-xs font-bold text-zinc-400">© 2026 Nebula UGS Station. All Rights Reserved.</span>
                                </div>
                                <div className="flex gap-8 text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                                    <a href="#" className="hover:text-white transition-colors">Privacy</a>
                                    <a href="#" className="hover:text-white transition-colors">Terms</a>
                                    <a href="#" className="hover:text-white transition-colors">Github</a>
                                </div>
                             </div>
                        </footer>
                    </main>

                    {/* HUD Overlay */}
                    <div className="fixed bottom-6 right-6 flex flex-col gap-3 z-[100] pointer-events-none">
                        <motion.div 
                            initial={{ x: 100 }}
                            animate={{ x: 0 }}
                            className="pointer-events-auto px-5 py-3 bg-white text-black rounded-2xl shadow-2xl flex items-center gap-3 group cursor-pointer"
                        >
                            <Trophy className="w-5 h-5" />
                            <div className="flex flex-col">
                                <span className="text-[10px] font-black uppercase tracking-tight">Daily Record</span>
                                <span className="text-[11px] font-bold">12,455 Players Online</span>
                            </div>
                        </motion.div>
                    </div>
                </div>
            );
        }

        function App() {
            const location = useLocation();
            const [isCloaked, setIsCloaked] = useState(true);

            useEffect(() => {
                document.title = "Learnify | Interactive Learning Portal";

                // Hidden shortcut: Alt + Shift + N
                const handleKey = (e) => {
                    if (e.altKey && e.shiftKey && e.key === 'N') {
                        handleEnter();
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            const handleEnter = () => {
                setIsCloaked(false);
                document.title = "Nebula UGS";
                window.scrollTo(0, 0);
            };

            if (isCloaked) {
                return <EducationCloak onEnter={handleEnter} />;
            }
            
            return (
                <AnimatePresence mode="wait">
                    <Routes location={location} key={location.pathname}>
                        <Route path="/" element={<MainLayout />} />
                        <Route path="/game/:id" element={<GameView />} />
                    </Routes>
                </AnimatePresence>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<Router><App /></Router>);
    </script>
</body>
</html>
